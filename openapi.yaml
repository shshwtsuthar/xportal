# =============================================================================
# OPENAPI SPECIFICATION: XPortal Student Management System (SMS) API
# VERSION: 2.1.0 (Enterprise Hardened, Production Ready)
# AUTHOR:  Lead Architect
#
# DESCRIPTION:
# This is the definitive, universally compatible, and feature-complete version
# of the API contract for the XPortal SMS. It includes all entities, workflows,
# and lifecycle management endpoints required for a fully operational RTO.
# It introduces the two-stage application process, comprehensive state management,
# robust data integrity patterns, and critical security controls.
#
# This is the single source of truth for all application development.
# =============================================================================
openapi: 3.0.3
info:
  title: XPortal SMS API
  description: The complete API for managing students, enrolments, academic delivery, finance, and compliance for Australian RTOs.
  version: 2.1.0

# -----------------------------------------------------------------------------
# SERVER DEFINITION
# -----------------------------------------------------------------------------
servers:
  - url: https://{your-supabase-project-ref}.supabase.co/functions/v1
    description: Supabase Edge Functions Production Server

# -----------------------------------------------------------------------------
# SECURITY DEFINITIONS
# -----------------------------------------------------------------------------
security:
  - bearerAuth: []

# -----------------------------------------------------------------------------
# TAGS
# -----------------------------------------------------------------------------
tags:
  - name: Applications & Enrolments
    description: The core workflow for enrolling students and managing their lifecycle.
  - name: Clients
    description: Managing the student (client) entity, the single source of truth for a person.
  - name: CRICOS
    description: Managing Confirmation of Enrolment (CoE) and other international student compliance.
  - name: Academic Delivery
    description: Endpoints for managing the day-to-day teaching operations.
  - name: Finance
    description: Endpoints for managing the financial lifecycle.
  - name: Reports
    description: Endpoints that provide aggregated, actionable intelligence.
  - name: Program & Subject Management
    description: Managing the RTO's "product catalog".
  - name: Agents
    description: Managing educational agent partners.
  - name: Reference Data
    description: Endpoints for fetching lists of codes and other static data.

# =============================================================================
# API PATHS (The Endpoints)
# =============================================================================
paths:
  # ---------------------------------------------------------------------------
  # == APPLICATIONS & ENROLMENTS ==
  # ---------------------------------------------------------------------------
  /applications:
    post:
      summary: Start a New Enrolment Application
      description: >
        Creates a new application in a 'Draft' state. This is the new entry point for the enrolment wizard.
        Supports an Idempotency-Key header to prevent duplicate application creation on network retries.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin, agent]
      requestBody:
        description: Can be an empty body to create a blank draft, or can contain initial data.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullEnrolmentPayload'
      responses:
        '201':
          description: Draft application created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'

  /applications/{applicationId}:
    patch:
      summary: Update a Draft Application
      description: Incrementally saves data to a draft application.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin, agent]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullEnrolmentPayload'
      responses:
        '200':
          description: Application updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'

  /applications/{applicationId}/submit:
    post:
      summary: Submit an Application for Approval
      description: Transitions the application status to 'Submitted' after validating all required data is present.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin, agent]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Application submitted for review.

  /applications/{applicationId}/approve:
    post:
      summary: Approve an Application and Create Enrolment
      description: >
        A protected, administrative endpoint. Takes a 'Submitted' application and executes the
        master transaction to create the official client, enrolment, and all associated records.
        This payload MUST now include the financial contract terms.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalPayload'
      responses:
        '201':
          description: Application approved and enrolment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullEnrolmentResponse'

  /enrolments/{enrolmentId}/state:
    put:
      summary: Change Enrolment State
      description: >
        Manages the lifecycle of an enrolment (Withdraw, Defer, Suspend). This is a critical,
        auditable state transition endpoint with compliance implications.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/EnrolmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrolmentStateChangePayload'
      responses:
        '200':
          description: Enrolment state successfully changed.
        '404':
          description: Enrolment not found.

  # ---------------------------------------------------------------------------
  # == CLIENTS ==
  # ---------------------------------------------------------------------------
  /clients:
    get:
      summary: List and Search Clients
      tags: [Clients]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: A list of clients.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientSummary'

  /clients/{clientId}:
    get:
      summary: Get a Single Client's Full Details
      description: >
        Retrieves the complete, aggregated record for a single client. The response MUST include
        an ETag header for concurrency control.
      tags: [Clients]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: The full client record.
          headers:
            ETag:
              description: The current version identifier for the client record.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientFull'
        '404':
          description: Client not found.
    patch:
      summary: Update Client Details
      description: >
        Updates a subset of a client's details. Must include the If-Match header with the latest
        ETag to prevent lost updates. Changes to sensitive PII are auto-audited by the database.
      tags: [Clients]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/ClientId'
        - name: If-Match
          in: header
          required: true
          description: The ETag value from the last GET request.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientPersonalDetails'
      responses:
        '200':
          description: Client updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientFull'
        '412':
          description: Precondition Failed. The client record was modified by someone else.
        '404':
          description: Client not found.

  /clients/merge:
    post:
      summary: Merge Two Duplicate Client Records
      description: A protected, administrative endpoint to merge a duplicate client record into a surviving record. This is a delicate, irreversible transaction.
      tags: [Clients]
      security:
        - bearerAuth: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                survivingClientId:
                  type: string
                  format: uuid
                subsumedClientId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Merge successful.

  /clients/{clientId}/health-check:
    get:
      summary: Check Client Data Completeness
      tags: [Clients]
      security:
        - bearerAuth: [admin, agent]
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Health status retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientHealthStatus'
        '404':
          description: Client not found.

  /clients/{clientId}/notes:
    get:
      summary: Get Notes for a Client
      tags: [Clients]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: A list of notes.
    post:
      summary: Add a Note to a Client Record
      tags: [Clients]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientNotePayload'
      responses:
        '201':
          description: Note created.

  # ---------------------------------------------------------------------------
  # == CRICOS ==
  # ---------------------------------------------------------------------------
  /cricos/coes:
    post:
      summary: Create a Confirmation of Enrolment (CoE)
      description: Creates a new CoE record against an enrolment, typically in a 'Draft' state before submission to PRISMS.
      tags: [CRICOS]
      security:
        - bearerAuth: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoEPayload'
      responses:
        '201':
          description: CoE created.

  /cricos/coes/{coeId}/cancel:
    post:
      summary: Cancel a Confirmation of Enrolment (CoE)
      description: A dedicated, auditable event to cancel a CoE, with a reason code for compliance.
      tags: [CRICOS]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/CoEId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoECancelPayload'
      responses:
        '200':
          description: CoE cancelled.

  # ---------------------------------------------------------------------------
  # == ACADEMIC DELIVERY ==
  # ---------------------------------------------------------------------------
  /enrolments/{enrolmentId}/credit-transfer:
    post:
      summary: Grant Credit Transfer or RPL
      description: Formally records the granting of a credit transfer or RPL for a specific unit within an enrolment.
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, academic_manager]
      parameters:
        - $ref: '#/components/parameters/EnrolmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditTransferPayload'
      responses:
        '201':
          description: Credit transfer successfully granted and recorded.

  /enrolments/{enrolmentId}/subjects/{subjectId}/outcome:
    put:
      summary: Record a Final Subject Outcome
      description: >
        A critical compliance endpoint. Records the final, aggregate academic outcome for a
        student in a specific unit of competency within an enrolment. This action is audited.
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/EnrolmentId'
        - $ref: '#/components/parameters/SubjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrolmentSubjectOutcomePayload'
      responses:
        '200':
          description: Outcome successfully recorded.
        '400':
          description: Bad Request (e.g., invalid outcome code).
        '404':
          description: Enrolment or Subject not found.

  /sessions/{sessionId}/roster:
    get:
      summary: Get Session Roster
      description: A user-centric endpoint that provides a simple, one-call way for a trainer to get a list of all students enrolled in their upcoming class.
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: The class roster.

  /staff/{staffId}/schedule:
    get:
      summary: Get Staff Member's Schedule
      description: A user-centric endpoint that returns a clean, aggregated list of all sessions a trainer is assigned to in a given period.
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: The staff member's schedule.

  # ---------------------------------------------------------------------------
  # == FINANCE ==
  # ---------------------------------------------------------------------------
  /invoices/{invoiceId}/void:
    post:
      summary: Void an Unpaid Invoice
      description: Transitions an 'Issued' but unpaid invoice to a 'Void' state. This is for correcting errors and is illegal if a payment has been made.
      tags: [Finance]
      security:
        - bearerAuth: [admin, finance]
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      responses:
        '200':
          description: Invoice successfully voided.
        '400':
          description: Bad Request. Invoice has payments and cannot be voided.

  /payments/{paymentId}/refund:
    post:
      summary: Issue a Refund Against a Payment
      description: Creates a refund record, ensuring a closed-loop accounting trail.
      tags: [Finance]
      security:
        - bearerAuth: [admin, finance]
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPayload'
      responses:
        '201':
          description: Refund processed.

  # ---------------------------------------------------------------------------
  # == REPORTS ==
  # ---------------------------------------------------------------------------
  /reports/attendance-at-risk:
    get:
      summary: At-Risk Attendance Report
      description: Returns a list of students whose attendance has fallen below a specified threshold in a given period.
      tags: [Reports]
      security:
        - bearerAuth: [admin, compliance]
      parameters:
        - name: minPercentage
          in: query
          required: true
          schema:
            type: integer
            example: 85
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: A list of at-risk students.

  /reports/financial-summary:
    get:
      summary: Financial Summary Report
      description: Returns an aggregated financial summary for a given period.
      tags: [Reports]
      security:
        - bearerAuth: [admin, finance]
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Aggregated financial data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialSummary'

  # ---------------------------------------------------------------------------
  # == REFERENCE DATA & CATALOG MANAGEMENT ==
  # ---------------------------------------------------------------------------
  /programs:
    get:
      summary: List all Programs
      tags: [Program & Subject Management]
      security:
        - bearerAuth: [admin, agent, trainer]
      responses:
        '200':
          description: A list of programs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Program'

  /programs/{programId}/subjects:
    get:
      summary: List Subjects for a Program
      tags: [Program & Subject Management]
      security:
        - bearerAuth: [admin, agent, trainer]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      responses:
        '200':
          description: A list of subjects for the program.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgramSubject'

  /reference-data/{codeType}:
    get:
      summary: Get AVETMISS Reference Codes
      tags: [Reference Data]
      security:
        - bearerAuth: [admin, agent, trainer]
      parameters:
        - name: codeType
          in: path
          required: true
          schema:
            type: string
            enum: [COUNTRY, LANGUAGE, DISABILITY_TYPE, PRIOR_EDUCATION, FUNDING_SOURCE, STUDY_REASON]
      responses:
        '200':
          description: A list of code-value pairs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferenceCode'

# =============================================================================
# REUSABLE COMPONENTS
# =============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Supabase-issued JSON Web Token (JWT)"

  parameters:
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnrolmentId:
      name: enrolmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubjectId:
      name: subjectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CoEId:
      name: coeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProgramId:
      name: programId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    # --- CORE WORKFLOW PAYLOADS & RESPONSES ---
    FullEnrolmentPayload:
      type: object
      description: The complete data object for an application.
      properties:
        existingClientId:
          type: string
          format: uuid
          nullable: true
        agentId:
          type: string
          format: uuid
          nullable: true
        isInternationalStudent:
          type: boolean
        personalDetails:
          $ref: '#/components/schemas/ClientPersonalDetails'
        address:
          $ref: '#/components/schemas/ClientAddress'
        avetmissDetails:
          $ref: '#/components/schemas/ClientAvetmissDetails'
        cricosDetails:
          $ref: '#/components/schemas/ClientCricosDetails'
        usi:
          $ref: '#/components/schemas/ClientUSI'
        enrolmentDetails:
          $ref: '#/components/schemas/EnrolmentDetails'

    ApprovalPayload:
      type: object
      description: The financial contract terms agreed upon for this enrolment, submitted at the point of approval.
      required: [tuitionFeeSnapshot, agentCommissionRateSnapshot]
      properties:
        tuitionFeeSnapshot:
          type: number
          format: double
          description: The agreed-upon total tuition fee for this enrolment, frozen in time.
        agentCommissionRateSnapshot:
          type: number
          format: double
          description: The agent's commission rate for this specific enrolment, frozen in time.

    EnrolmentDetails:
      type: object
      properties:
        programId:
          type: string
          format: uuid
        subjectStructure:
          type: object
          description: The snapshot of the program structure for this enrolment.
          properties:
            coreSubjectIds:
              type: array
              items:
                type: string
                format: uuid
            electiveSubjectIds:
              type: array
              items:
                type: string
                format: uuid
        startDate:
          type: string
          format: date
        expectedCompletionDate:
          type: string
          format: date
        deliveryLocationId:
          type: string
          format: uuid
        deliveryModeId:
          type: string
        fundingSourceId:
          type: string
        studyReasonId:
          type: string
        isVetInSchools:
          type: boolean
          default: false

    FullEnrolmentResponse:
      type: object
      properties:
        clientId:
          type: string
          format: uuid
        enrolmentId:
          type: string
          format: uuid
        message:
          type: string
          example: "Enrolment created successfully."

    Application:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [Draft, Submitted, Approved, Rejected]
        application_payload:
          $ref: '#/components/schemas/FullEnrolmentPayload'
        createdAt:
          type: string
          format: 'date-time'
        updatedAt:
          type: string
          format: 'date-time'

    EnrolmentStateChangePayload:
      type: object
      required: [status, effectiveDate]
      properties:
        status:
          type: string
          enum: [Withdrawn, Deferred, Suspended]
        effectiveDate:
          type: string
          format: date
        withdrawalReasonCode:
          type: string
          description: "Required if status is 'Withdrawn'. Must be a valid AVETMISS code."
        deferralReason:
          type: string
          description: "Required if status is 'Deferred'."
        suspensionReason:
          type: string
          description: "Required if status is 'Suspended'."
        deferralEndDate:
          type: string
          format: date
          description: "Required only if status is 'Deferred'."

    ClientHealthStatus:
      type: object
      properties:
        personalDetailsComplete:
          type: boolean
        avetmissComplete:
          type: boolean
        cricosComplete:
          type: boolean
          nullable: true
        missingAvetmissFields:
          type: array
          items:
            type: string
          example: ["labourForceId", "highestSchoolLevelId"]

    EnrolmentSubjectOutcomePayload:
      type: object
      required: [outcomeIdentifierNational, endDate]
      properties:
        outcomeIdentifierNational:
          type: string
          description: "The final AVETMISS outcome code (e.g., 20, 30, 40)."
          example: "20"
        endDate:
          type: string
          format: date
          description: "The actual completion date for the unit."

    ClientNotePayload:
      type: object
      required: [note]
      properties:
        note:
          type: string
        category:
          type: string
          nullable: true

    CoEPayload:
      type: object
      required: [enrolmentId, courseStartDate, courseEndDate, totalTuitionFee, prepaidFees]
      properties:
        enrolmentId:
          type: string
          format: uuid
        courseStartDate:
          type: string
          format: date
        courseEndDate:
          type: string
          format: date
        totalTuitionFee:
          type: number
          format: double
        prepaidFees:
          type: number
          format: double

    CoECancelPayload:
      type: object
      required: [cancellationReasonCode, effectiveDate]
      properties:
        cancellationReasonCode:
          type: string
        effectiveDate:
          type: string
          format: date

    RefundPayload:
      type: object
      required: [amount, refundMethod]
      properties:
        amount:
          type: number
          format: double
        refundMethod:
          type: string
        reason:
          type: string
          nullable: true

    FinancialSummary:
      type: object
      properties:
        totalInvoiced:
          type: number
          format: double
        totalPaymentsReceived:
          type: number
          format: double
        totalRefundsIssued:
          type: number
          format: double
        totalCommissionsPayable:
          type: number
          format: double
        totalCommissionsPaid:
          type: number
          format: double

    CreditTransferPayload:
      type: object
      required: [subjectId, grantedDate]
      properties:
        subjectId:
          type: string
          format: uuid
        grantedDate:
          type: string
          format: date
        evidenceUrl:
          type: string
          format: uri
          description: "Link to the evidence document in Supabase Storage."
        issuingOrganisationName:
          type: string
        notes:
          type: string
          nullable: true

    # --- CLIENT & COMPLIANCE SUB-SCHEMAS ---
    ClientPersonalDetails:
      type: object
      # Note: required fields are for creation; PATCH may allow partial updates.
      properties:
        title:
          type: string
          example: "Mr"
        firstName:
          type: string
          example: "John"
        lastName:
          type: string
          example: "Citizen"
        dateOfBirth:
          type: string
          format: date
          description: "ISO 8601 format: YYYY-MM-DD"
          example: "1990-01-15"
        gender:
          type: string
          description: "AVETMISS code for gender"
          example: "M"
        primaryEmail:
          type: string
          format: email
          example: "john.citizen@example.com"
        alternativeEmail:
          type: string
          format: email
          nullable: true
        mobilePhone:
          type: string
          example: "0412345678"
        homePhone:
          type: string
          nullable: true
        workPhone:
          type: string
          nullable: true

    ClientAddress:
      type: object
      properties:
        residential:
          $ref: '#/components/schemas/Address'
        isPostalSameAsResidential:
          type: boolean
          default: true
        postal:
          $ref: '#/components/schemas/Address'
          description: Required only if isPostalSameAsResidential is false.

    ClientAvetmissDetails:
      type: object
      properties:
        countryOfBirthId:
          type: string
          description: "AVETMISS code for country"
          example: "1101"
        languageAtHomeId:
          type: string
          description: "AVETMISS code for language"
          example: "1201"
        indigenousStatusId:
          type: string
          description: "AVETMISS code for indigenous status"
          example: "4"
        highestSchoolLevelId:
          type: string
          description: "AVETMISS code for school level"
          example: "12"
        isAtSchool:
          type: boolean
        hasDisability:
          type: boolean
        disabilityTypeIds:
          type: array
          items:
            type: string
            description: "AVETMISS code for disability type"
            example: "13"
        hasPriorEducation:
          type: boolean
        priorEducationCodes:
          type: array
          items:
            type: string
            description: "AVETMISS code for prior education"
            example: "008"
        labourForceId:
          type: string
          description: "AVETMISS code for labour force status"
          example: "03"
        surveyContactStatus:
          type: string
          nullable: true
          description: "AVETMISS code for survey status"
          example: "A"

    ClientCricosDetails:
      type: object
      properties:
        countryOfCitizenshipId:
          type: string
          description: "ISO 3166-1 alpha-3 country code"
          example: "AUS"
        passportNumber:
          type: string
          example: "E1234567"
        passportExpiryDate:
          type: string
          format: date
          example: "2030-01-01"

    ClientUSI:
      type: object
      description: "Exactly one of usi or exemptionCode must be provided."
      properties:
        usi:
          type: string
          nullable: true
          pattern: '^[A-HJ-NP-Z2-9]{10}$'
          example: "3AW88WHM8G"
        exemptionCode:
          type: string
          nullable: true
          description: "AVETMISS code for USI exemption"
          example: "INT"

    # --- GENERIC & REUSABLE SCHEMAS ---
    Address:
      type: object
      properties:
        streetNumber:
          type: string
          example: "123"
        streetName:
          type: string
          example: "Main Street"
        unitDetails:
          type: string
          nullable: true
          example: "Unit 5"
        buildingName:
          type: string
          nullable: true
        suburb:
          type: string
          example: "Sydney"
        state:
          type: string
          example: "NSW"
        postcode:
          type: string
          example: "2000"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "personalDetails.dateOfBirth"
              message:
                type: string
                example: "Date of birth cannot be in the future."

    # --- ACADEMIC & FINANCE SCHEMAS ---
    AttendanceSubmission:
      type: object
      required: [clientId, status]
      properties:
        clientId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Present, Absent, Late, Excused]
        notes:
          type: string
          nullable: true

    GradePayload:
      type: object
      required: [grade]
      properties:
        grade:
          type: string
          enum: [C, NYC]
        feedback:
          type: string
          nullable: true

    PaymentPayload:
      type: object
      required: [amount, paymentMethod]
      properties:
        amount:
          type: number
          format: double
          description: "The amount of the payment received."
        paymentMethod:
          type: string
          enum: [Credit Card, Bank Transfer, Cash, Other]
        paymentDate:
          type: string
          format: date
        transactionReference:
          type: string
          nullable: true
          description: "e.g., Stripe transaction ID"

    # --- FULL ENTITY REPRESENTATIONS (for GET responses) ---
    ClientFull:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        clientIdentifier:
          type: string
          readOnly: true
        personalDetails:
          $ref: '#/components/schemas/ClientPersonalDetails'
        address:
          $ref: '#/components/schemas/ClientAddress'
        avetmissDetails:
          $ref: '#/components/schemas/ClientAvetmissDetails'
        cricosDetails:
          $ref: '#/components/schemas/ClientCricosDetails'
        usi:
          $ref: '#/components/schemas/ClientUSI'
        createdAt:
          type: string
          format: 'date-time'
          readOnly: true
        updatedAt:
          type: string
          format: 'date-time'
          readOnly: true

    ClientSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientIdentifier:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        primaryEmail:
          type: string
          format: email
        mobilePhone:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        invoiceId:
          type: string
          format: uuid
          readOnly: true
        amount:
          type: number
          format: double
          readOnly: true
        paymentDate:
          type: string
          format: date
          readOnly: true
        paymentMethod:
          type: string
          readOnly: true
        transactionReference:
          type: string
          nullable: true
          readOnly: true
        createdAt:
          type: string
          format: 'date-time'
          readOnly: true

    AssessmentSubmission:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        assessmentTaskId:
          type: string
          format: uuid
          readOnly: true
        clientId:
          type: string
          format: uuid
          readOnly: true
        attemptNumber:
          type: integer
          readOnly: true
        submissionDate:
          type: string
          format: 'date-time'
          readOnly: true
        grade:
          type: string
          enum: [C, NYC]
          nullable: true
        gradedAt:
          type: string
          format: 'date-time'
          nullable: true
          readOnly: true
        feedback:
          type: string
          nullable: true

    # --- REFERENCE DATA SCHEMAS ---
    Program:
      type: object
      properties:
        id:
          type: string
          format: uuid
        program_identifier:
          type: string
        program_name:
          type: string
        status:
          type: string

    ProgramSubject:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        subject_identifier:
          type: string
        subject_name:
          type: string
        unit_type:
          type: string
          enum: [Core, Elective]

    ReferenceCode:
      type: object
      properties:
        code:
          type: string
          example: "1101"
        description:
          type: string
          example: "Australia"