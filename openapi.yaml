                  properties:
                    requestedStartDate:
                      type: string
                      format: date
                      description: Optional requested start date to align with rolling schedule windows
                    catchupMode:
                      type: string
                      enum: [SequentialNextTerm, ParallelNextTerm]
                      description: Strategy for allocating catch-up units in the next term
