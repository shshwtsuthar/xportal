# =============================================================================
# OPENAPI SPECIFICATION: XPortal Student Management System (SMS) API
# VERSION: 2.1.0 (Enterprise Hardened, Production Ready)
# AUTHOR:  Lead Architect
#
# DESCRIPTION:
# This is the definitive, universally compatible, and feature-complete version
# of the API contract for the XPortal SMS. It includes all entities, workflows,
# and lifecycle management endpoints required for a fully operational RTO.
# It introduces the two-stage application process, comprehensive state management,
# robust data integrity patterns, and critical security controls.
#
# This is the single source of truth for all application development.
# =============================================================================
openapi: 3.0.3
info:
  title: XPortal SMS API
  description: The complete API for managing students, enrolments, academic delivery, finance, and compliance for Australian RTOs.
  version: 2.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

# -----------------------------------------------------------------------------
# SERVER DEFINITION
# -----------------------------------------------------------------------------
servers:
  - url: https://{your-supabase-project-ref}.supabase.co/functions/v1
    description: Supabase Edge Functions Production Server
    variables:
      your-supabase-project-ref:
        default: change-me
        description: Supabase project ref slug

# -----------------------------------------------------------------------------
# SECURITY DEFINITIONS
# -----------------------------------------------------------------------------
security:
  - bearerAuth: []

# -----------------------------------------------------------------------------
# TAGS
# -----------------------------------------------------------------------------
tags:
  - name: Applications & Enrolments
    description: The core workflow for enrolling students and managing their lifecycle.
  - name: Clients
    description: Managing the student (client) entity, the single source of truth for a person.
  - name: CRICOS
    description: Managing Confirmation of Enrolment (CoE) and other international student compliance.
  - name: Academic Delivery
    description: Endpoints for managing the day-to-day teaching operations.
  - name: Finance
    description: Endpoints for managing the financial lifecycle.
  - name: Reports
    description: Endpoints that provide aggregated, actionable intelligence.
  - name: Program & Subject Management
    description: Managing the RTO's "product catalog".
  - name: Agents
    description: Managing educational agent partners.
  - name: Reference Data
    description: Endpoints for fetching lists of codes and other static data.

# =============================================================================
# API PATHS (The Endpoints)
# =============================================================================
paths:
  # ---------------------------------------------------------------------------
  # == APPLICATIONS & ENROLMENTS ==
  # ---------------------------------------------------------------------------
  /applications:
    get:
      operationId: listApplications
      summary: List All Applications
      description: >
        Returns a paginated list of all applications with their current status and metadata.
        Supports filtering by status and pagination for large datasets.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin, agent]
      parameters:
        - name: page
          in: query
          description: Page number for pagination (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of applications per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          description: Filter applications by status
          schema:
            type: string
            enum: [Draft, Submitted, Approved, Rejected]
        - name: search
          in: query
          description: Search applications by client name or email
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of applications.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      operationId: createApplication
      summary: Start a New Enrolment Application
      description: >
        Creates a new application in a 'Draft' state. This is the new entry point for the enrolment wizard.
        Supports an Idempotency-Key header to prevent duplicate application creation on network retries.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin, agent]
      requestBody:
        description: Can be an empty body to create a blank draft, or can contain initial data.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullEnrolmentPayload'
      responses:
        '201':
          description: Draft application created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /applications/{applicationId}:
    patch:
      operationId: updateApplication
      summary: Update a Draft Application
      description: Incrementally saves data to a draft application.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin, agent]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullEnrolmentPayload'
      responses:
        '200':
          description: Application updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /applications/{applicationId}/submit:
    post:
      operationId: submitApplication
      summary: Submit an Application for Approval
      description: Transitions the application status to 'Submitted' after validating all required data is present.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin, agent]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Application submitted for review.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /applications/{applicationId}/approve:
    post:
      operationId: approveApplication
      summary: Approve an Application and Create Enrolment
      description: >
        A protected, administrative endpoint. Takes a 'Submitted' application and executes the
        master transaction to create the official client, enrolment, and all associated records.
        This payload MUST now include the financial contract terms.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalPayload'
      responses:
        '201':
          description: Application approved and enrolment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullEnrolmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /applications/{applicationId}/reject:
    post:
      operationId: rejectApplication
      summary: Reject a Submitted Application
      description: >
        Rejects a submitted application with a reason. This transitions the application
        status to 'Rejected' and prevents further processing.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  description: Reason for rejection
                  minLength: 1
                  maxLength: 500
      responses:
        '200':
          description: Application rejected successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'

  /applications/drafts:
    get:
      operationId: listDraftApplications
      summary: List Draft Applications
      description: >
        Returns a paginated list of all draft applications. This endpoint is optimized
        for the draft management interface.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin, agent]
      parameters:
        - name: page
          in: query
          description: Page number for pagination (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of applications per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search applications by client name or email
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of draft applications.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'

  /applications/submitted:
    get:
      operationId: listSubmittedApplications
      summary: List Submitted Applications
      description: >
        Returns a paginated list of all submitted applications awaiting approval.
        This endpoint is optimized for the approval workflow interface.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin]
      parameters:
        - name: page
          in: query
          description: Page number for pagination (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of applications per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search applications by client name or email
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of submitted applications.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'

  /applications/approved:
    get:
      operationId: listApprovedApplications
      summary: List Approved Applications
      description: >
        Returns a paginated list of all approved applications. These applications
        have been processed and converted to enrolments.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin]
      parameters:
        - name: page
          in: query
          description: Page number for pagination (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of applications per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search applications by client name or email
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of approved applications.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'

  /applications/stats:
    get:
      operationId: getApplicationStats
      summary: Get Application Statistics
      description: >
        Returns aggregated statistics about applications including counts by status,
        recent activity, and performance metrics.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin]
      responses:
        '200':
          description: Application statistics.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalApplications:
                    type: integer
                    description: Total number of applications
                  draftCount:
                    type: integer
                    description: Number of draft applications
                  submittedCount:
                    type: integer
                    description: Number of submitted applications
                  approvedCount:
                    type: integer
                    description: Number of approved applications
                  rejectedCount:
                    type: integer
                    description: Number of rejected applications
                  recentSubmissions:
                    type: integer
                    description: Applications submitted in the last 7 days
                  averageProcessingTime:
                    type: number
                    description: Average time from submission to approval in hours
                  completionRate:
                    type: number
                    description: Percentage of applications that reach approved status
                    minimum: 0
                    maximum: 100

  /enrolments/{enrolmentId}/state:
    put:
      operationId: changeEnrolmentState
      summary: Change Enrolment State
      description: >
        Manages the lifecycle of an enrolment (Withdraw, Defer, Suspend). This is a critical,
        auditable state transition endpoint with compliance implications.
      tags: [Applications & Enrolments]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/EnrolmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrolmentStateChangePayload'
      responses:
        '200':
          description: Enrolment state successfully changed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # == CLIENTS ==
  # ---------------------------------------------------------------------------
  /clients:
    get:
      operationId: listClients
      summary: List and Search Clients
      tags: [Clients]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: A list of clients.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /clients/{clientId}:
    get:
      operationId: getClient
      summary: Get a Single Client's Full Details
      description: >
        Retrieves the complete, aggregated record for a single client. The response MUST include
        an ETag header for concurrency control.
      tags: [Clients]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: The full client record.
          headers:
            ETag:
              description: The current version identifier for the client record.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientFull'
        '404':
          description: Client not found.
    patch:
      operationId: updateClient
      summary: Update Client Details
      description: >
        Updates a subset of a client's details. Must include the If-Match header with the latest
        ETag to prevent lost updates. Changes to sensitive PII are auto-audited by the database.
      tags: [Clients]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/ClientId'
        - name: If-Match
          in: header
          required: true
          description: The ETag value from the last GET request.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientPersonalDetails'
      responses:
        '200':
          description: Client updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientFull'
        '412':
          description: Precondition Failed. The client record was modified by someone else.
        '404':
          description: Client not found.

  /clients/merge:
    post:
      operationId: mergeClients
      summary: Merge Two Duplicate Client Records
      description: A protected, administrative endpoint to merge a duplicate client record into a surviving record. This is a delicate, irreversible transaction.
      tags: [Clients]
      security:
        - bearerAuth: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                survivingClientId:
                  type: string
                  format: uuid
                subsumedClientId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Merge successful.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /clients/{clientId}/health-check:
    get:
      operationId: getClientHealth
      summary: Check Client Data Completeness
      tags: [Clients]
      security:
        - bearerAuth: [admin, agent]
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Health status retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientHealthStatus'
        '404':
          description: Client not found.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /clients/{clientId}/notes:
    get:
      operationId: listClientNotes
      summary: Get Notes for a Client
      tags: [Clients]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: A list of notes.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      operationId: createClientNote
      summary: Add a Note to a Client Record
      tags: [Clients]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientNotePayload'
      responses:
        '201':
          description: Note created.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ---------------------------------------------------------------------------
  # == CRICOS ==
  # ---------------------------------------------------------------------------
  /cricos/coes:
    post:
      operationId: createCoE
      summary: Create a Confirmation of Enrolment (CoE)
      description: Creates a new CoE record against an enrolment, typically in a 'Draft' state before submission to PRISMS.
      tags: [CRICOS]
      security:
        - bearerAuth: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoEPayload'
      responses:
        '201':
          description: CoE created.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /cricos/coes/{coeId}/cancel:
    post:
      operationId: cancelCoE
      summary: Cancel a Confirmation of Enrolment (CoE)
      description: A dedicated, auditable event to cancel a CoE, with a reason code for compliance.
      tags: [CRICOS]
      security:
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/CoEId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoECancelPayload'
      responses:
        '200':
          description: CoE cancelled.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # == ACADEMIC DELIVERY ==
  # ---------------------------------------------------------------------------
  /enrolments/{enrolmentId}/credit-transfer:
    post:
      operationId: createCreditTransfer
      summary: Grant Credit Transfer or RPL
      description: Formally records the granting of a credit transfer or RPL for a specific unit within an enrolment.
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, academic_manager]
      parameters:
        - $ref: '#/components/parameters/EnrolmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditTransferPayload'
      responses:
        '201':
          description: Credit transfer successfully granted and recorded.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /enrolments/{enrolmentId}/subjects/{subjectId}/outcome:
    put:
      operationId: setEnrolmentSubjectOutcome
      summary: Record a Final Subject Outcome
      description: >
        A critical compliance endpoint. Records the final, aggregate academic outcome for a
        student in a specific unit of competency within an enrolment. This action is audited.
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/EnrolmentId'
        - $ref: '#/components/parameters/SubjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/EnrolmentSubjectOutcomePayload'
                - $ref: '#/components/schemas/GradePayload'
      responses:
        '200':
          description: Outcome successfully recorded.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{sessionId}/roster:
    get:
      operationId: getSessionRoster
      summary: Get Session Roster
      description: A user-centric endpoint that provides a simple, one-call way for a trainer to get a list of all students enrolled in their upcoming class.
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: The class roster.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{sessionId}/attendance:
    post:
      operationId: createAttendanceSubmission
      summary: Submit session attendance
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceSubmission'
      responses:
        '201':
          description: Attendance recorded.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /staff/{staffId}/schedule:
    get:
      operationId: getStaffSchedule
      summary: Get Staff Member's Schedule
      description: A user-centric endpoint that returns a clean, aggregated list of all sessions a trainer is assigned to in a given period.
      tags: [Academic Delivery]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: The staff member's schedule.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # == FINANCE ==
  # ---------------------------------------------------------------------------
  /invoices/{invoiceId}/void:
    post:
      operationId: voidInvoice
      summary: Void an Unpaid Invoice
      description: Transitions an 'Issued' but unpaid invoice to a 'Void' state. This is for correcting errors and is illegal if a payment has been made.
      tags: [Finance]
      security:
        - bearerAuth: [admin, finance]
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      responses:
        '200':
          description: Invoice successfully voided.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/{paymentId}/refund:
    post:
      operationId: refundPayment
      summary: Issue a Refund Against a Payment
      description: Creates a refund record, ensuring a closed-loop accounting trail.
      tags: [Finance]
      security:
        - bearerAuth: [admin, finance]
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/RefundPayload'
                - $ref: '#/components/schemas/PaymentPayload'
      responses:
        '201':
          description: Refund processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ---------------------------------------------------------------------------
  # == REPORTS ==
  # ---------------------------------------------------------------------------
  /reports/attendance-at-risk:
    get:
      operationId: getAttendanceAtRisk
      summary: At-Risk Attendance Report
      description: Returns a list of students whose attendance has fallen below a specified threshold in a given period.
      tags: [Reports]
      security:
        - bearerAuth: [admin, compliance]
      parameters:
        - name: minPercentage
          in: query
          required: true
          schema:
            type: integer
            example: 85
        - name: startDate
          in: query
          schema:
            type: string
            format: date
