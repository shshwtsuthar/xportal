      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramScheduleUpsert'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  isValid:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        message:
                          type: string
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /programs/{programId}/rolling-schedule/preview:
    post:
      operationId: previewProgramRollingSchedule
      summary: Preview rolling schedule windows across cycles
      tags: [Program & Subject Management]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cycles:
                  type: integer
                  minimum: 1
                  default: 2
                requestedStartDate:
                  type: string
                  format: date
                  nullable: true
                catchupMode:
                  type: string
                  enum: [SequentialNextTerm, ParallelNextTerm]
                  nullable: true
      responses:
        '200':
          description: Rolling schedule preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollingSchedulePreview'
        '404':
          $ref: '#/components/responses/NotFound'

  /programs/{programId}/derive-catchup:
    post:
      operationId: deriveCatchupForProgram
      summary: Derive catch-up units based on start unit and schedule
      tags: [Program & Subject Management]
      security:
        - bearerAuth: [admin, trainer]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startUnitId]
              properties:
                startUnitId:
                  type: string
                  format: uuid
                catchupMode:
                  type: string
                  enum: [SequentialNextTerm, ParallelNextTerm]
      responses:
        '200':
          description: Derived catch-up units
          content:
            application/json:
              schema:
                type: object
                properties:
                  catchupUnits:
                    type: array
                    items:
                      type: object
                      properties:
                        subjectId: { type: string, format: uuid }
                        targetTermIndex: { type: integer }
                        startDate: { type: string, format: date }
                        endDate: { type: string, format: date }
        '404':
          $ref: '#/components/responses/NotFound'

  /agents:
    get:
      operationId: listAgents
      summary: List Active Educational Agents
      description: Returns a list of active educational agents available for student referrals.
      tags: [Agents]
      security:
        - bearerAuth: [admin, agent]
      responses:
        '200':
          description: A list of active agents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /reference-data/{codeType}:
    get:
      operationId: getReferenceData
      summary: Get AVETMISS Reference Codes
      tags: [Reference Data]
      security:
        - bearerAuth: [admin, agent, trainer]
      parameters:
        - name: codeType
          in: path
          required: true
          schema:
            type: string
            enum: [COUNTRY, LANGUAGE, DISABILITY_TYPE, PRIOR_EDUCATION, FUNDING_SOURCE, STUDY_REASON]
      responses:
        '200':
          description: A list of code-value pairs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferenceCode'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ---------------------------------------------------------------------------
  # == ADDRESS AUTOCOMPLETE ==
  # ---------------------------------------------------------------------------
  /address-autocomplete:
    get:
      operationId: addressAutocomplete
      summary: Address Autocomplete
      description: >
        Provides address autocomplete functionality using the Addressable API.
        Returns formatted addresses that can be used to populate address forms.
      tags: [Reference Data]
      security:
        - bearerAuth: [admin, agent, trainer]
      parameters:
        - name: query
          in: query
          required: true
          description: The partial address query string (4-6 characters recommended)
          schema:
            type: string
            example: "220 Queen St Auc"
        - name: country
          in: query
          required: true
          description: The country code for address lookup
          schema:
            type: string
            enum: [AU, NZ]
            default: AU
        - name: maxResults
          in: query
          required: false
          description: Maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
      responses:
        '200':
          description: A list of matching addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressableAddress'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

# =============================================================================
# REUSABLE COMPONENTS
# =============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Supabase-issued JSON Web Token (JWT)"

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  parameters:
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnrolmentId:
      name: enrolmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubjectId:
      name: subjectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CoEId:
      name: coeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProgramId:
      name: programId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CoursePlan:
      type: object
      properties:
        id: { type: string, format: uuid }
        program_id: { type: string, format: uuid }
        name: { type: string }
        version: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: 'date-time' }

    CoursePlanCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        version: { type: integer, default: 1 }
        is_active: { type: boolean, default: false }

    CoursePlanSubject:
      type: object
      properties:
        subject_id: { type: string, format: uuid }
        subject_identifier: { type: string }
        subject_name: { type: string }
        unit_type: { type: string, enum: [Core, Elective] }
        sort_order: { type: integer }

    CoursePlanSubjectInput:
      type: object
      required: [subject_id, unit_type]
      properties:
        subject_id: { type: string, format: uuid }
        unit_type: { type: string, enum: [Core, Elective] }
        sort_order: { type: integer, default: 0 }
        estimated_duration_weeks: { type: integer, minimum: 1, default: 4 }
        complexity_level: { type: string, enum: [Basic, Intermediate, Advanced], default: Basic }

    CourseOfferingUpdate:
      type: object
      properties:
        programId: { type: string, format: uuid }
        startDate: { type: string, format: date, nullable: true }
        endDate: { type: string, format: date, nullable: true }
        deliveryLocationId: { type: string, format: uuid, nullable: true }
        maxStudents: { type: integer, nullable: true }
        status: { type: string, enum: [Scheduled, Active, Completed, Cancelled] }
        isRolling: { type: boolean }
        defaultPlanId: { type: string, format: uuid, nullable: true }

    PaymentPlanTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        program_id: { type: string, format: uuid }
        name: { type: string }
        is_default: { type: boolean }
        created_at: { type: string, format: 'date-time' }

    PaymentPlanTemplateCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        is_default: { type: boolean, default: false }

    PaymentPlanInstalment:
      type: object
      properties:
        id: { type: string, format: uuid }
        template_id: { type: string, format: uuid }
        description: { type: string }
        amount: { type: number, format: double }
        offset_days: { type: integer }
        sort_order: { type: integer }

    PaymentPlanInstalmentInput:
      type: object
      required: [description, amount]
      properties:
        description: { type: string }
        amount: { type: number, format: double }
        offset_days: { type: integer, default: 0 }
        sort_order: { type: integer, default: 0 }

    PaymentPlanDeriveInput:
      type: object
      required: [templateId]
      properties:
        templateId: { type: string, format: uuid }
        startDate:
          type: string
          format: date
          description: Deprecated; prefer anchor+anchorDate.
        enrolmentId: { type: string, format: uuid, nullable: true }
        anchor:
          type: string
          enum: [OFFER_LETTER, COMMENCEMENT, CUSTOM]
        anchorDate:
          type: string
          format: date
          description: Required if anchor=CUSTOM; for COMMENCEMENT when no course offering date is set.

    PaymentPlanDerivedInstalment:
      type: object
      properties:
        description: { type: string }
        amount: { type: number, format: double }
        dueDate: { type: string, format: date }

    PaymentPlanDerivedSchedule:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PaymentPlanDerivedInstalment' }
    OfferLetterResult:
      type: object
      properties:
        path:
          type: string
          description: Storage path where the offer letter PDF is stored.
        mimeType:
          type: string
          example: application/pdf
        sizeBytes:
          type: integer
        version:
          type: string
        createdAt:
          type: string
          format: 'date-time'
    # --- CORE WORKFLOW PAYLOADS & RESPONSES ---
    FullEnrolmentPayload:
      type: object
      description: The complete data object for an application.
      properties:
        existingClientId:
          type: string
          format: uuid
          nullable: true
        agentId:
          type: string
          format: uuid
          nullable: true
        isInternationalStudent:
          type: boolean
        personalDetails:
          $ref: '#/components/schemas/ClientPersonalDetails'
        address:
          $ref: '#/components/schemas/ClientAddress'
        avetmissDetails:
          $ref: '#/components/schemas/ClientAvetmissDetails'
        cricosDetails:
          $ref: '#/components/schemas/ClientCricosDetails'
        usi:
          $ref: '#/components/schemas/ClientUSI'
        enrolmentDetails:
          $ref: '#/components/schemas/EnrolmentDetails'
        paymentPlan:
          type: object
          description: Snapshot of the selected payment plan for this draft application.
          properties:
            selectedTemplateId:
              type: string
              format: uuid
            anchor:
              type: string
              enum: [OFFER_LETTER, COMMENCEMENT, CUSTOM]
            anchorDate:
              type: string
              format: date
              nullable: true
            schedule:
              type: array
              items:
                $ref: '#/components/schemas/PaymentPlanDerivedInstalment'
            tuitionFeeSnapshot:
              type: number
              format: double

    ApprovalPayload:
      type: object
      description: The financial contract terms agreed upon for this enrolment, submitted at the point of approval.
      required: [tuitionFeeSnapshot, agentCommissionRateSnapshot]
      properties:
        tuitionFeeSnapshot:
          type: number
          format: double
          description: The agreed-upon total tuition fee for this enrolment, frozen in time.
        agentCommissionRateSnapshot:
          type: number
          format: double
          description: The agent's commission rate for this specific enrolment, frozen in time.

    EnrolmentDetails:
      type: object
      properties:
        programId:
          type: string
          format: uuid
        courseOfferingId:
          type: string
          format: uuid
          description: The specific course offering/intake the student is enrolling in
        subjectStructure:
          type: object
          description: The snapshot of the program structure for this enrolment.
          properties:
            coreSubjectIds:
              type: array
              items:
                type: string
                format: uuid
            electiveSubjectIds:
              type: array
              items:
                type: string
                format: uuid
        startDate:
          type: string
          format: date
        expectedCompletionDate:
          type: string
          format: date
        deliveryLocationId:
          type: string
          format: uuid
        deliveryModeId:
          type: string
        fundingSourceId:
          type: string
        studyReasonId:
          type: string
        isVetInSchools:
          type: boolean
          default: false

    FullEnrolmentResponse:
      type: object
      properties:
        clientId:
          type: string
          format: uuid
        enrolmentId:
          type: string
          format: uuid
        message:
          type: string
          example: "Enrolment created successfully."

    Application:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [Draft, Submitted, Approved, Rejected]
        application_payload:
          $ref: '#/components/schemas/FullEnrolmentPayload'
        createdAt:
          type: string
          format: 'date-time'
        updatedAt:
          type: string
          format: 'date-time'

    ApplicationSummary:
      type: object
      description: A lightweight representation of an application for list views
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the application
        status:
          type: string
          enum: [Draft, Submitted, Approved, Rejected]
          description: Current status of the application
        clientName:
          type: string
          description: Full name of the applicant (from personalDetails)
          example: "John Citizen"
        clientEmail:
          type: string
          format: email
          description: Primary email of the applicant
          example: "john.citizen@example.com"
        programName:
          type: string
          nullable: true
          description: Name of the program being applied for
          example: "Certificate III in Business"
        agentName:
          type: string
          nullable: true
          description: Name of the educational agent (if applicable)
          example: "Global Education Services"
        createdAt:
          type: string
          format: 'date-time'
          description: When the application was first created
        updatedAt:
          type: string
          format: 'date-time'
          description: When the application was last modified
        createdClientId:
          type: string
          format: uuid
          nullable: true
          description: ID of the client created when application was approved
        createdEnrolmentId:
          type: string
          format: uuid
          nullable: true
          description: ID of the enrolment created when application was approved

    ApplicationListResponse:
      type: object
      description: Paginated response for application listings
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationSummary'
        pagination:
          type: object
          properties:
            page:
              type: integer
              description: Current page number (1-based)
              example: 1
            limit:
              type: integer
              description: Number of items per page
              example: 20
            total:
              type: integer
              description: Total number of applications matching the query
              example: 150
            totalPages:
              type: integer
              description: Total number of pages
              example: 8
            hasNext:
              type: boolean
              description: Whether there are more pages available
              example: true
            hasPrevious:
              type: boolean
              description: Whether there are previous pages available
              example: false

    EnrolmentStateChangePayload:
      type: object
      required: [status, effectiveDate]
      properties:
        status:
          type: string
          enum: [Withdrawn, Deferred, Suspended]
        effectiveDate:
          type: string
          format: date
        withdrawalReasonCode:
          type: string
          description: "Required if status is 'Withdrawn'. Must be a valid AVETMISS code."
        deferralReason:
          type: string
          description: "Required if status is 'Deferred'."
        suspensionReason:
          type: string
          description: "Required if status is 'Suspended'."
        deferralEndDate:
          type: string
          format: date
          description: "Required only if status is 'Deferred'."

    ClientHealthStatus:
      type: object
      properties:
        personalDetailsComplete:
          type: boolean
        avetmissComplete:
          type: boolean
        cricosComplete:
          type: boolean
          nullable: true
        missingAvetmissFields:
          type: array
          items:
            type: string
          example: ["labourForceId", "highestSchoolLevelId"]

    EnrolmentSubjectOutcomePayload:
      type: object
      required: [outcomeIdentifierNational, endDate]
      properties:
        outcomeIdentifierNational:
          type: string
          description: "The final AVETMISS outcome code (e.g., 20, 30, 40)."
          example: "20"
        endDate:
          type: string
          format: date
          description: "The actual completion date for the unit."

    ClientNotePayload:
      type: object
      required: [note]
      properties:
        note:
          type: string
        category:
          type: string
          nullable: true

    CoEPayload:
      type: object
      required: [enrolmentId, courseStartDate, courseEndDate, totalTuitionFee, prepaidFees]
      properties:
        enrolmentId:
          type: string
          format: uuid
        courseStartDate:
          type: string
          format: date
        courseEndDate:
          type: string
          format: date
        totalTuitionFee:
          type: number
          format: double
        prepaidFees:
          type: number
          format: double

    CoECancelPayload:
      type: object
      required: [cancellationReasonCode, effectiveDate]
      properties:
        cancellationReasonCode:
          type: string
        effectiveDate:
          type: string
          format: date

    RefundPayload:
      type: object
      required: [amount, refundMethod]
      properties:
        amount:
          type: number
          format: double
        refundMethod:
          type: string
        reason:
          type: string
          nullable: true

    FinancialSummary:
      type: object
      properties:
        totalInvoiced:
          type: number
          format: double
        totalPaymentsReceived:
          type: number
          format: double
        totalRefundsIssued:
          type: number
          format: double
        totalCommissionsPayable:
          type: number
          format: double
        totalCommissionsPaid:
          type: number
          format: double

    CreditTransferPayload:
      type: object
      required: [subjectId, grantedDate]
      properties:
        subjectId:
          type: string
          format: uuid
        grantedDate:
          type: string
          format: date
        evidenceUrl:
          type: string
          format: uri
          description: "Link to the evidence document in Supabase Storage."
        issuingOrganisationName:
          type: string
        notes:
          type: string
          nullable: true

    # --- CLIENT & COMPLIANCE SUB-SCHEMAS ---
    ClientPersonalDetails:
      type: object
      # Note: required fields are for creation; PATCH may allow partial updates.
      properties:
        title:
          type: string
          example: "Mr"
        firstName:
          type: string
          example: "John"
        lastName:
          type: string
          example: "Citizen"
        dateOfBirth:
          type: string
          format: date
          description: "ISO 8601 format: YYYY-MM-DD"
          example: "1990-01-15"
        gender:
          type: string
          description: "AVETMISS code for gender"
          example: "M"
        primaryEmail:
          type: string
          format: email
          example: "john.citizen@example.com"
        alternativeEmail:
          type: string
          format: email
          nullable: true
        mobilePhone:
          type: string
          example: "0412345678"
        homePhone:
          type: string
          nullable: true
        workPhone:
          type: string
          nullable: true

    ClientAddress:
      type: object
      properties:
        residential:
          $ref: '#/components/schemas/Address'
        isPostalSameAsResidential:
          type: boolean
          default: true
        postal:
          $ref: '#/components/schemas/Address'
          description: Required only if isPostalSameAsResidential is false.

    ClientAvetmissDetails:
      type: object
      properties:
        countryOfBirthId:
          type: string
          description: "AVETMISS code for country"
          example: "1101"
        languageAtHomeId:
          type: string
          description: "AVETMISS code for language"
          example: "1201"
        indigenousStatusId:
          type: string
          description: "AVETMISS code for indigenous status"
          example: "4"
        highestSchoolLevelId:
          type: string
          description: "AVETMISS code for school level"
          example: "12"
        isAtSchool:
          type: boolean
        hasDisability:
          type: boolean
        disabilityTypeIds:
          type: array
          items:
            type: string
            description: "AVETMISS code for disability type"
            example: "13"
        hasPriorEducation:
          type: boolean
        priorEducationCodes:
          type: array
          items:
            type: string
            description: "AVETMISS code for prior education"
            example: "008"
        labourForceId:
          type: string
          description: "AVETMISS code for labour force status"
          example: "03"
        surveyContactStatus:
          type: string
          nullable: true
          description: "AVETMISS code for survey status"
          example: "A"

    ClientCricosDetails:
      type: object
      properties:
        countryOfCitizenshipId:
          type: string
          description: "ISO 3166-1 alpha-3 country code"
          example: "AUS"
        passportNumber:
          type: string
          example: "E1234567"
        passportExpiryDate:
          type: string
          format: date
          example: "2030-01-01"

    ClientUSI:
      type: object
      description: "Exactly one of usi or exemptionCode must be provided."
      properties:
        usi:
          type: string
          nullable: true
          pattern: '^[A-HJ-NP-Z2-9]{10}$'
          example: "3AW88WHM8G"
        exemptionCode:
          type: string
          nullable: true
          description: "AVETMISS code for USI exemption"
          example: "INT"

    # --- GENERIC & REUSABLE SCHEMAS ---
    Address:
      type: object
      properties:
        streetNumber:
          type: string
          example: "123"
        streetName:
          type: string
          example: "Main Street"
        unitDetails:
          type: string
          nullable: true
          example: "Unit 5"
        buildingName:
          type: string
          nullable: true
        suburb:
          type: string
          example: "Sydney"
        state:
          type: string
          example: "NSW"
        postcode:
          type: string
          example: "2000"

    AddressableAddress:
      type: object
      description: Address response from Addressable API
      properties:
        streetNumber:
          type: string
          description: Street number
          example: "220"
        streetName:
          type: string
          description: Street name
          example: "Queen Street"
        unitDetails:
          type: string
          nullable: true
          description: Unit/apartment details
          example: "Unit 5"
        buildingName:
          type: string
          nullable: true
          description: Building name
          example: "Central Plaza"
        suburb:
          type: string
          description: Suburb/locality
          example: "Melbourne"
        state:
          type: string
          description: State code
          example: "VIC"
        postcode:
          type: string
          description: Postcode
          example: "3000"
        formatted:
          type: string
          description: Complete formatted address
          example: "220 Queen Street, Melbourne VIC 3000"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "personalDetails.dateOfBirth"
              message:
                type: string
                example: "Date of birth cannot be in the future."

    # --- ACADEMIC & FINANCE SCHEMAS ---
    AttendanceSubmission:
      type: object
      required: [clientId, status]
      properties:
        clientId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Present, Absent, Late, Excused]
        notes:
          type: string
          nullable: true

    GradePayload:
      type: object
      required: [grade]
      properties:
        grade:
          type: string
          enum: [C, NYC]
        feedback:
          type: string
          nullable: true

    PaymentPayload:
      type: object
      required: [amount, paymentMethod]
      properties:
        amount:
          type: number
          format: double
          description: "The amount of the payment received."
        paymentMethod:
          type: string
          enum: [Credit Card, Bank Transfer, Cash, Other]
        paymentDate:
          type: string
          format: date
        transactionReference:
          type: string
          nullable: true
          description: "e.g., Stripe transaction ID"

    # --- FULL ENTITY REPRESENTATIONS (for GET responses) ---
    ClientFull:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        clientIdentifier:
          type: string
          readOnly: true
        personalDetails:
          $ref: '#/components/schemas/ClientPersonalDetails'
        address:
          $ref: '#/components/schemas/ClientAddress'
        avetmissDetails:
          $ref: '#/components/schemas/ClientAvetmissDetails'
        cricosDetails:
          $ref: '#/components/schemas/ClientCricosDetails'
        usi:
          $ref: '#/components/schemas/ClientUSI'
        createdAt:
          type: string
          format: 'date-time'
          readOnly: true
        updatedAt:
          type: string
          format: 'date-time'
          readOnly: true

    ClientSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientIdentifier:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        primaryEmail:
          type: string
          format: email
        mobilePhone:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        invoiceId:
          type: string
          format: uuid
          readOnly: true
        amount:
          type: number
          format: double
          readOnly: true
        paymentDate:
          type: string
          format: date
          readOnly: true
        paymentMethod:
          type: string
          readOnly: true
        transactionReference:
          type: string
          nullable: true
          readOnly: true
        createdAt:
          type: string
          format: 'date-time'
          readOnly: true

    AssessmentSubmission:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        assessmentTaskId:
          type: string
          format: uuid
          readOnly: true
        clientId:
          type: string
          format: uuid
          readOnly: true
        attemptNumber:
          type: integer
          readOnly: true
        submissionDate:
          type: string
          format: 'date-time'
          readOnly: true
        grade:
          type: string
          enum: [C, NYC]
          nullable: true
        gradedAt:
          type: string
          format: 'date-time'
          nullable: true
          readOnly: true
        feedback:
          type: string
          nullable: true

    # --- REFERENCE DATA SCHEMAS ---
    Program:
      type: object
      properties:
        id:
          type: string
          format: uuid
        program_identifier:
          type: string
        program_name:
          type: string
        status:
          type: string

    ProgramSubject:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        subject_identifier:
          type: string
        subject_name:
          type: string
        unit_type:
          type: string
          enum: [Core, Elective]

    ReferenceCode:
      type: object
      properties:
        code:
          type: string
          example: "1101"
        description:
          type: string
          example: "Australia"

    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_name:
          type: string
          example: "Global Education Services"
        agent_type:
          type: string
          example: "International"
        primary_contact_name:
          type: string
          nullable: true
          example: "John Smith"
        primary_contact_email:
          type: string
          format: email
          example: "john@globaledu.com"
        primary_contact_phone:
          type: string
          nullable: true
          example: "+61 2 1234 5678"
        status:
          type: string
          example: "Active"
        commission_rate:
          type: number
          format: double
          nullable: true
          example: 15.0

    CourseOffering:
      type: object
      properties:
        id:
          type: string
          format: uuid
        program_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        delivery_location_id:
          type: string
          format: uuid
          nullable: true
        max_students:
          type: integer
          nullable: true
        status:
          type: string
          enum: [Scheduled, Active, Completed, Cancelled]

    # --- DOCUMENT MANAGEMENT SCHEMAS ---
    ApplicationDocument:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the document
        application_id:
          type: string
          format: uuid
          description: ID of the application this document belongs to
        path:
          type: string
          description: Full path to the document in Supabase Storage
          example: "student-docs/applications/123/uploads/passport.pdf"
        doc_type:
          type: string
          enum: [EVIDENCE, OFFER_LETTER, COE, OTHER]
          description: Type/category of the document
        version:
          type: string
          description: Version identifier for the document
          example: "v2024-01-15"
        mime_type:
          type: string
          description: MIME type of the document
          example: "application/pdf"
        size_bytes:
          type: integer
          description: Size of the document in bytes
        created_at:
          type: string
          format: date-time
          description: When the document was uploaded
        updated_at:
          type: string
          format: date-time
          description: When the document was last modified

    DocumentUploadRequest:
      type: object
      required: [filename, contentType, category]
      properties:
        filename:
          type: string
          description: Original filename of the document
          example: "passport.pdf"
        contentType:
          type: string
          description: MIME type of the document
          example: "application/pdf"
        category:
          type: string
          enum: [EVIDENCE, OFFER_LETTER, COE, OTHER]
          description: Category/type of the document
          example: "EVIDENCE"

    DocumentUploadUrlResponse:
      type: object
      properties:
        uploadUrl:
          type: string
          format: uri
          description: Signed URL for uploading the document
        headers:
          type: object
          description: Required headers for the upload request
          additionalProperties:
            type: string
        objectPath:
          type: string
          description: Path where the document will be stored
          example: "applications/123/uploads/1640995200000_passport.pdf"
        expiresAt:
          type: string
          format: date-time
          description: When the upload URL expires

    DocumentConfirmRequest:
      type: object
      required: [objectPath, size]
      properties:
        objectPath:
          type: string
          description: Path of the uploaded document in storage
          example: "applications/123/uploads/1640995200000_passport.pdf"
        size:
          type: integer
          description: Size of the uploaded file in bytes
          minimum: 1
          maximum: 20971520  # 20MB
        hash:
          type: string
          description: Optional file hash for integrity verification
          nullable: true

    DocumentConfirmResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the created document record
        message:
          type: string
          description: Success message
          example: "Document uploaded successfully"
        path:
          type: string
          description: Full path to the document in storage
          example: "student-docs/applications/123/uploads/1640995200000_passport.pdf"
        size:
          type: integer
          description: Size of the uploaded file in bytes
        contentType:
          type: string
          description: MIME type of the document
          example: "application/pdf"

    # --- PASSPORT PROCESSING SCHEMAS ---
    PassportProcessRequest:
      type: object
      required: [applicationId, documentId, documentPath]
      properties:
        applicationId:
          type: string
          format: uuid
          description: ID of the application to update with extracted data
        documentId:
          type: string
          format: uuid
          description: ID of the document being processed
        documentPath:
          type: string
          description: Path to the document in Supabase Storage
          example: "student-docs/applications/123/uploads/passport.pdf"

    PassportProcessResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: "Passport processed successfully"
        extractedData:
          $ref: '#/components/schemas/ExtractedPassportData'
        fieldsExtracted:
          type: array
          items:
            type: string
          description: List of field names that were successfully extracted
          example: ["firstName", "lastName", "gender", "dateOfBirth"]

    ExtractedPassportData:
      type: object
      description: Personal information extracted from passport document
      properties:
        firstName:
          type: string
          nullable: true
          description: Extracted first name
          example: "SIMRAN"
        lastName:
          type: string
          nullable: true
          description: Extracted last name
          example: "KAUR"
        gender:
          type: string
          enum: [Male, Female, Other]
          nullable: true
          description: Extracted gender
          example: "Female"
        dateOfBirth:
          type: string
          format: date
          nullable: true
          description: Extracted date of birth in YYYY-MM-DD format
          example: "1997-06-12"
        nationality:
          type: string
          nullable: true
          description: Extracted nationality
          example: "INDIAN"
        placeOfBirth:
          type: string
          nullable: true
          description: Extracted place of birth
          example: "PUNJAB"
        passportNumber:
          type: string
          nullable: true
          description: Extracted passport number
          example: "N6975116"
        issuingCountry:
          type: string
          nullable: true
          description: Extracted issuing country code
          example: "IND"
        dateOfIssue:
          type: string
          format: date
          nullable: true
          description: Extracted date of issue in YYYY-MM-DD format
          example: "2016-02-01"
        dateOfExpiry:
          type: string
          format: date
          nullable: true
          description: Extracted date of expiry in YYYY-MM-DD format
          example: "2026-02-09"
        mrzLine1:
          type: string
          nullable: true
          description: Extracted MRZ line 1
        mrzLine2:
          type: string
          nullable: true
          description: Extracted MRZ line 2

    # --- COURSE PLAN PREREQUISITE SCHEMAS ---
    CoursePlanStructure:
      type: object
      description: Complete course plan structure with subjects, prerequisites, and validation results
      properties:
        plan:
          $ref: '#/components/schemas/CoursePlan'
        subjects:
          type: array
          description: Subjects in the plan with additional metadata
          items:
            allOf:
              - $ref: '#/components/schemas/CoursePlanSubject'
              - type: object
                properties:
                  estimated_duration_weeks: { type: integer }
                  complexity_level: { type: string, enum: [Basic, Intermediate, Advanced] }
                  prerequisites_count: { type: integer, description: Number of prerequisites for this subject }
                  dependents_count: { type: integer, description: Number of subjects that depend on this subject }
        prerequisites:
          type: array
          description: All prerequisite relationships in the plan
          items:
            $ref: '#/components/schemas/SubjectPrerequisite'
        progression_validation:
          $ref: '#/components/schemas/ProgressionValidationResult'

    SubjectPrerequisite:
      type: object
      description: A prerequisite relationship between two subjects
      properties:
        id: { type: string, format: uuid }
        subject_id: { type: string, format: uuid, description: The subject that requires the prerequisite }
        prerequisite_subject_id: { type: string, format: uuid, description: The subject that must be completed first }
        prerequisite_type: { type: string, enum: [Required, Recommended] }
        subject_name: { type: string, description: Name of the subject requiring the prerequisite }
        prerequisite_subject_name: { type: string, description: Name of the prerequisite subject }
        created_at: { type: string, format: 'date-time' }

    SubjectPrerequisiteInput:
      type: object
      required: [subject_id, prerequisite_subject_id, prerequisite_type]
      properties:
        subject_id: { type: string, format: uuid }
        prerequisite_subject_id: { type: string, format: uuid }
        prerequisite_type: { type: string, enum: [Required, Recommended] }

    ProgressionValidationResult:
      type: object
      description: Results of validating course plan progression rules
      properties:
        is_valid: { type: boolean, description: Whether the progression rules are valid }
        errors:
          type: array
          description: List of validation errors
          items:
            type: object
            properties:
              type: { type: string, description: Error type (e.g., CircularDependency, OrphanedSubject) }
              message: { type: string, description: Human-readable error message }
              subject_ids: { type: array, items: { type: string, format: uuid }, description: IDs of subjects involved in the error }
        warnings:
          type: array
          description: List of validation warnings
          items:
            type: object

    ProgressionPreviewRequest:
      type: object
      required: [intake_model]
      properties:
        intake_model: { type: string, enum: [Fixed, Rolling], description: The intake model to preview }
        start_date: { type: string, format: date, nullable: true, description: Start date for Fixed intake preview }
        simulation_duration_weeks: { type: integer, minimum: 1, default: 52, description: Duration to simulate in weeks }

    ProgramSchedule:
      type: object
      properties:
        id: { type: string, format: uuid }
        program_id: { type: string, format: uuid }
        name: { type: string }
        cycle_anchor_date:
          type: string
          format: date
          description: The anchor date for cycle calculations (inclusive start)
        timezone:
          type: string
          description: IANA timezone (default Australia/Melbourne)
        units:
          type: array
          items:
            $ref: '#/components/schemas/ProgramScheduleUnit'
        created_at: { type: string, format: 'date-time' }
        updated_at: { type: string, format: 'date-time' }

    ProgramScheduleUnit:
      type: object
      properties:
        id: { type: string, format: uuid }
        schedule_id: { type: string, format: uuid }
        subject_id: { type: string, format: uuid }
        order_index: { type: integer }
        duration_days: { type: integer, minimum: 1 }

    ProgramScheduleUpsert:
      type: object
      required: [cycleAnchorDate, units]
      properties:
        name: { type: string }
        cycleAnchorDate:
          type: string
          format: date
        timezone:
          type: string
          default: Australia/Melbourne
        units:
          type: array
          minItems: 1
          items:
            type: object
            required: [subjectId, orderIndex, durationDays]
            properties:
              subjectId: { type: string, format: uuid }
              orderIndex: { type: integer, minimum: 0 }
              durationDays: { type: integer, minimum: 1 }

    RollingSchedulePreview:
      type: object
      properties:
        cycle_anchor_date: { type: string, format: date }
        timezone: { type: string }
        cycles: { type: integer }
        windows:
          type: array
          items:
            type: object
            properties:
              term_index: { type: integer }
              subject_id: { type: string, format: uuid }
              subject_name: { type: string }
              start_date: { type: string, format: date }
              end_date: { type: string, format: date }

    ProgressionPreviewResult:
      type: object
      description: Results of course progression preview for different intake models
      properties:
        intake_model: { type: string, enum: [Fixed, Rolling] }
        total_duration_weeks: { type: integer, description: Total estimated duration of the course }
        progression_phases:
          type: array
          description: Phases of progression through the course
          items:
            $ref: '#/components/schemas/ProgressionPhase'
        fixed_intake_timeline:
          type: array
          description: Timeline for Fixed intake model
          items:
            $ref: '#/components/schemas/FixedIntakeTimelineEntry'
        rolling_intake_sequence:
          type: array
          description: Sequence for Rolling intake model
          items:
            $ref: '#/components/schemas/RollingIntakeSequenceEntry'

    ProgressionPhase:
      type: object
      description: A phase in the course progression
      properties:
        phase_number: { type: integer, description: Sequential phase number }
        subject_ids: { type: array, items: { type: string, format: uuid }, description: Subjects that can be taken in this phase }
        estimated_start_week: { type: integer, description: Week when this phase begins }
        estimated_end_week: { type: integer, description: Week when this phase ends }

    FixedIntakeTimelineEntry:
      type: object
      description: Timeline entry for Fixed intake model
      properties:
        subject_id: { type: string, format: uuid }
        subject_name: { type: string }
        start_week: { type: integer, description: Week when this subject begins }
        end_week: { type: integer, description: Week when this subject ends }
        duration_weeks: { type: integer, description: Duration of this subject in weeks }
        prerequisites_completed_by_week: { type: integer, description: Week by which prerequisites must be completed }
        start_date: { type: string, format: date, description: Actual start date of this subject }
        end_date: { type: string, format: date, description: Actual end date of this subject }

    RollingIntakeSequenceEntry:
      type: object
      description: Sequence entry for Rolling intake model
      properties:
        unlock_trigger: { type: string, description: What triggers unlocking these subjects (Enrolment, SubjectCompletion) }
        subjects_unlocked:
          type: array
          description: Subjects unlocked by this trigger
          items:
            type: object
            properties:
              subject_id: { type: string, format: uuid }
              subject_name: { type: string }
              estimated_duration_weeks: { type: integer }
              prerequisite_subjects: { type: array, items: { type: string, format: uuid }, description: Subject IDs that must be completed first }
              available_from_date: { type: string, format: date, description: Date when this subject becomes available }
              estimated_completion_date: { type: string, format: date, description: Estimated completion date if started immediately }