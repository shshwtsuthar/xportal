# =============================================================================
# REUSABLE COMPONENTS
# =============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Supabase-issued JSON Web Token (JWT)"

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  parameters:
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnrolmentId:
      name: enrolmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubjectId:
      name: subjectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CoEId:
      name: coeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProgramId:
      name: programId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CoursePlan:
      type: object
      properties:
        id: { type: string, format: uuid }
        program_id: { type: string, format: uuid }
        name: { type: string }
        version: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: 'date-time' }

    CoursePlanCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        version: { type: integer, default: 1 }
        is_active: { type: boolean, default: false }

    CoursePlanSubject:
      type: object
      properties:
        subject_id: { type: string, format: uuid }
        subject_identifier: { type: string }
        subject_name: { type: string }
        unit_type: { type: string, enum: [Core, Elective] }
        sort_order: { type: integer }

    CoursePlanSubjectInput:
      type: object
      required: [subject_id, unit_type]
      properties:
        subject_id: { type: string, format: uuid }
        unit_type: { type: string, enum: [Core, Elective] }
        sort_order: { type: integer, default: 0 }

    CourseOfferingUpdate:
      type: object
      properties:
        programId: { type: string, format: uuid }
        startDate: { type: string, format: date, nullable: true }
        endDate: { type: string, format: date, nullable: true }
        deliveryLocationId: { type: string, format: uuid, nullable: true }
        maxStudents: { type: integer, nullable: true }
        status: { type: string, enum: [Scheduled, Active, Completed, Cancelled] }
        isRolling: { type: boolean }
        defaultPlanId: { type: string, format: uuid, nullable: true }

    PaymentPlanTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        program_id: { type: string, format: uuid }
        name: { type: string }
        is_default: { type: boolean }
        created_at: { type: string, format: 'date-time' }

    PaymentPlanTemplateCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        is_default: { type: boolean, default: false }

    PaymentPlanInstalment:
      type: object
      properties:
        id: { type: string, format: uuid }
        template_id: { type: string, format: uuid }
        description: { type: string }
        amount: { type: number, format: double }
        offset_days: { type: integer }
        sort_order: { type: integer }

    PaymentPlanInstalmentInput:
      type: object
      required: [description, amount]
      properties:
        description: { type: string }
        amount: { type: number, format: double }
        offset_days: { type: integer, default: 0 }
        sort_order: { type: integer, default: 0 }

    PaymentPlanDeriveInput:
      type: object
      required: [templateId, startDate]
      properties:
        templateId: { type: string, format: uuid }
        startDate: { type: string, format: date }
        enrolmentId: { type: string, format: uuid, nullable: true }

    PaymentPlanDerivedInstalment:
      type: object
      properties:
        description: { type: string }
        amount: { type: number, format: double }
        dueDate: { type: string, format: date }

    PaymentPlanDerivedSchedule:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PaymentPlanDerivedInstalment' }
    # --- CORE WORKFLOW PAYLOADS & RESPONSES ---
    FullEnrolmentPayload:
      type: object
      description: The complete data object for an application.
      properties:
        existingClientId:
          type: string
          format: uuid
          nullable: true
        agentId:
          type: string
          format: uuid
          nullable: true
        isInternationalStudent:
          type: boolean
        personalDetails:
          $ref: '#/components/schemas/ClientPersonalDetails'
        address:
          $ref: '#/components/schemas/ClientAddress'
        avetmissDetails:
          $ref: '#/components/schemas/ClientAvetmissDetails'
        cricosDetails:
          $ref: '#/components/schemas/ClientCricosDetails'
        usi:
          $ref: '#/components/schemas/ClientUSI'
        enrolmentDetails:
          $ref: '#/components/schemas/EnrolmentDetails'

    ApprovalPayload:
      type: object
      description: The financial contract terms agreed upon for this enrolment, submitted at the point of approval.
      required: [tuitionFeeSnapshot, agentCommissionRateSnapshot]
      properties:
        tuitionFeeSnapshot:
          type: number
          format: double
          description: The agreed-upon total tuition fee for this enrolment, frozen in time.
        agentCommissionRateSnapshot:
          type: number
          format: double
          description: The agent's commission rate for this specific enrolment, frozen in time.

    EnrolmentDetails:
      type: object
      properties:
        programId:
          type: string
          format: uuid
        courseOfferingId:
          type: string
          format: uuid
          description: The specific course offering/intake the student is enrolling in
        subjectStructure:
          type: object
          description: The snapshot of the program structure for this enrolment.
          properties:
            coreSubjectIds:
              type: array
              items:
                type: string
                format: uuid
            electiveSubjectIds:
              type: array
              items:
                type: string
                format: uuid
        startDate:
          type: string
          format: date
        expectedCompletionDate:
          type: string
          format: date
        deliveryLocationId:
          type: string
          format: uuid
        deliveryModeId:
          type: string
        fundingSourceId:
          type: string
        studyReasonId:
          type: string
        isVetInSchools:
          type: boolean
          default: false

    FullEnrolmentResponse:
      type: object
      properties:
        clientId:
          type: string
          format: uuid
        enrolmentId:
          type: string
          format: uuid
        message:
          type: string
          example: "Enrolment created successfully."

    Application:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [Draft, Submitted, Approved, Rejected]
        application_payload:
          $ref: '#/components/schemas/FullEnrolmentPayload'
        createdAt:
          type: string
          format: 'date-time'
        updatedAt:
          type: string
          format: 'date-time'

    ApplicationSummary:
      type: object
      description: A lightweight representation of an application for list views
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the application
        status:
          type: string
          enum: [Draft, Submitted, Approved, Rejected]
          description: Current status of the application
        clientName:
          type: string
          description: Full name of the applicant (from personalDetails)
          example: "John Citizen"
        clientEmail:
          type: string
          format: email
          description: Primary email of the applicant
          example: "john.citizen@example.com"
        programName:
          type: string
          nullable: true
          description: Name of the program being applied for
          example: "Certificate III in Business"
        agentName:
          type: string
          nullable: true
          description: Name of the educational agent (if applicable)
          example: "Global Education Services"
        createdAt:
          type: string
          format: 'date-time'
          description: When the application was first created
        updatedAt:
          type: string
          format: 'date-time'
          description: When the application was last modified
        createdClientId:
          type: string
          format: uuid
          nullable: true
          description: ID of the client created when application was approved
        createdEnrolmentId:
          type: string
          format: uuid
          nullable: true
          description: ID of the enrolment created when application was approved

    ApplicationListResponse:
      type: object
      description: Paginated response for application listings
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationSummary'
        pagination:
          type: object
          properties:
            page:
              type: integer
              description: Current page number (1-based)
              example: 1
            limit:
              type: integer
              description: Number of items per page
              example: 20
            total:
              type: integer
              description: Total number of applications matching the query
              example: 150
            totalPages:
              type: integer
              description: Total number of pages
              example: 8
            hasNext:
              type: boolean
              description: Whether there are more pages available
              example: true
            hasPrevious:
              type: boolean
              description: Whether there are previous pages available
              example: false

    EnrolmentStateChangePayload:
      type: object
      required: [status, effectiveDate]
      properties:
        status:
          type: string
          enum: [Withdrawn, Deferred, Suspended]
        effectiveDate:
          type: string
          format: date
        withdrawalReasonCode:
          type: string
          description: "Required if status is 'Withdrawn'. Must be a valid AVETMISS code."
        deferralReason:
          type: string
          description: "Required if status is 'Deferred'."
        suspensionReason:
          type: string
          description: "Required if status is 'Suspended'."
        deferralEndDate:
          type: string
          format: date
          description: "Required only if status is 'Deferred'."

    ClientHealthStatus:
      type: object
      properties:
        personalDetailsComplete:
          type: boolean
        avetmissComplete:
          type: boolean
        cricosComplete:
          type: boolean
          nullable: true
        missingAvetmissFields:
          type: array
          items:
            type: string
          example: ["labourForceId", "highestSchoolLevelId"]

    EnrolmentSubjectOutcomePayload:
      type: object
      required: [outcomeIdentifierNational, endDate]
      properties:
        outcomeIdentifierNational:
          type: string
          description: "The final AVETMISS outcome code (e.g., 20, 30, 40)."
          example: "20"
        endDate:
          type: string
          format: date
          description: "The actual completion date for the unit."

    ClientNotePayload:
      type: object
      required: [note]
      properties:
        note:
          type: string
        category:
          type: string
          nullable: true

    CoEPayload:
      type: object
      required: [enrolmentId, courseStartDate, courseEndDate, totalTuitionFee, prepaidFees]
      properties:
        enrolmentId:
          type: string
          format: uuid
        courseStartDate:
          type: string
          format: date
        courseEndDate:
          type: string
          format: date
        totalTuitionFee:
          type: number
          format: double
        prepaidFees:
          type: number
          format: double

    CoECancelPayload:
      type: object
      required: [cancellationReasonCode, effectiveDate]
      properties:
        cancellationReasonCode:
          type: string
        effectiveDate:
          type: string
          format: date

    RefundPayload:
      type: object
      required: [amount, refundMethod]
      properties:
        amount:
          type: number
          format: double
        refundMethod:
          type: string
        reason:
          type: string
          nullable: true

    FinancialSummary:
      type: object
      properties:
        totalInvoiced:
          type: number
          format: double
        totalPaymentsReceived:
          type: number
          format: double
        totalRefundsIssued:
          type: number
          format: double
        totalCommissionsPayable:
          type: number
          format: double
        totalCommissionsPaid:
          type: number
          format: double

    CreditTransferPayload:
      type: object
      required: [subjectId, grantedDate]
      properties:
        subjectId:
          type: string
          format: uuid
        grantedDate:
          type: string
          format: date
        evidenceUrl:
          type: string
          format: uri
          description: "Link to the evidence document in Supabase Storage."
        issuingOrganisationName:
          type: string
        notes:
          type: string
          nullable: true

    # --- CLIENT & COMPLIANCE SUB-SCHEMAS ---
    ClientPersonalDetails:
      type: object
      # Note: required fields are for creation; PATCH may allow partial updates.
      properties:
        title:
          type: string
          example: "Mr"
        firstName:
          type: string
          example: "John"
        lastName:
          type: string
          example: "Citizen"
        dateOfBirth:
          type: string
          format: date
          description: "ISO 8601 format: YYYY-MM-DD"
          example: "1990-01-15"
        gender:
          type: string
          description: "AVETMISS code for gender"
          example: "M"
        primaryEmail:
          type: string
          format: email
          example: "john.citizen@example.com"
        alternativeEmail:
          type: string
          format: email
          nullable: true
        mobilePhone:
          type: string
          example: "0412345678"
        homePhone:
          type: string
          nullable: true
        workPhone:
          type: string
          nullable: true

    ClientAddress:
      type: object
      properties:
        residential:
          $ref: '#/components/schemas/Address'
        isPostalSameAsResidential:
          type: boolean
          default: true
        postal:
          $ref: '#/components/schemas/Address'
          description: Required only if isPostalSameAsResidential is false.

    ClientAvetmissDetails:
      type: object
      properties:
        countryOfBirthId:
          type: string
          description: "AVETMISS code for country"
          example: "1101"
        languageAtHomeId:
          type: string
          description: "AVETMISS code for language"
          example: "1201"
        indigenousStatusId:
          type: string
          description: "AVETMISS code for indigenous status"
          example: "4"
        highestSchoolLevelId:
          type: string
          description: "AVETMISS code for school level"
          example: "12"
        isAtSchool:
          type: boolean
        hasDisability:
          type: boolean
        disabilityTypeIds:
          type: array
          items:
            type: string
            description: "AVETMISS code for disability type"
            example: "13"
        hasPriorEducation:
          type: boolean
        priorEducationCodes:
          type: array
          items:
            type: string
            description: "AVETMISS code for prior education"
            example: "008"
        labourForceId:
          type: string
          description: "AVETMISS code for labour force status"
          example: "03"
        surveyContactStatus:
          type: string
          nullable: true
          description: "AVETMISS code for survey status"
          example: "A"

    ClientCricosDetails:
      type: object
      properties:
        countryOfCitizenshipId:
          type: string
          description: "ISO 3166-1 alpha-3 country code"
          example: "AUS"
        passportNumber:
          type: string
          example: "E1234567"
        passportExpiryDate:
          type: string
          format: date
          example: "2030-01-01"

    ClientUSI:
      type: object
      description: "Exactly one of usi or exemptionCode must be provided."
      properties:
        usi:
          type: string
          nullable: true
          pattern: '^[A-HJ-NP-Z2-9]{10}$'
          example: "3AW88WHM8G"
        exemptionCode:
          type: string
          nullable: true
          description: "AVETMISS code for USI exemption"
          example: "INT"

    # --- GENERIC & REUSABLE SCHEMAS ---
    Address:
      type: object
      properties:
        streetNumber:
          type: string
          example: "123"
        streetName:
          type: string
          example: "Main Street"
        unitDetails:
          type: string
          nullable: true
          example: "Unit 5"
        buildingName:
          type: string
          nullable: true
        suburb:
          type: string
          example: "Sydney"
        state:
          type: string
          example: "NSW"
        postcode:
          type: string
          example: "2000"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "personalDetails.dateOfBirth"
              message:
                type: string
                example: "Date of birth cannot be in the future."

    # --- ACADEMIC & FINANCE SCHEMAS ---
    AttendanceSubmission:
      type: object
      required: [clientId, status]
      properties:
        clientId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Present, Absent, Late, Excused]
        notes:
          type: string
          nullable: true

    GradePayload:
      type: object
      required: [grade]
      properties:
        grade:
          type: string
          enum: [C, NYC]
        feedback:
          type: string
          nullable: true

    PaymentPayload:
      type: object
      required: [amount, paymentMethod]
      properties:
        amount:
          type: number
          format: double
          description: "The amount of the payment received."
        paymentMethod:
          type: string
          enum: [Credit Card, Bank Transfer, Cash, Other]
        paymentDate:
          type: string
          format: date
        transactionReference:
          type: string
          nullable: true
          description: "e.g., Stripe transaction ID"

    # --- FULL ENTITY REPRESENTATIONS (for GET responses) ---
    ClientFull:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        clientIdentifier:
          type: string
          readOnly: true
        personalDetails:
          $ref: '#/components/schemas/ClientPersonalDetails'
        address:
          $ref: '#/components/schemas/ClientAddress'
        avetmissDetails:
          $ref: '#/components/schemas/ClientAvetmissDetails'
        cricosDetails:
          $ref: '#/components/schemas/ClientCricosDetails'
        usi:
          $ref: '#/components/schemas/ClientUSI'
        createdAt:
          type: string
          format: 'date-time'
          readOnly: true
        updatedAt:
          type: string
          format: 'date-time'
          readOnly: true

    ClientSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientIdentifier:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        primaryEmail:
          type: string
          format: email
        mobilePhone:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        invoiceId:
          type: string
          format: uuid
          readOnly: true
        amount:
          type: number
          format: double
          readOnly: true
        paymentDate:
          type: string
          format: date
          readOnly: true
        paymentMethod:
          type: string
          readOnly: true
        transactionReference:
          type: string
          nullable: true
          readOnly: true
        createdAt:
          type: string
          format: 'date-time'
          readOnly: true

    AssessmentSubmission:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        assessmentTaskId:
          type: string
          format: uuid
          readOnly: true
        clientId:
          type: string
          format: uuid
          readOnly: true
        attemptNumber:
          type: integer
          readOnly: true
        submissionDate:
          type: string
          format: 'date-time'
          readOnly: true
        grade:
          type: string
          enum: [C, NYC]
          nullable: true
        gradedAt:
          type: string
          format: 'date-time'
          nullable: true
          readOnly: true
        feedback:
          type: string
          nullable: true

    # --- REFERENCE DATA SCHEMAS ---
    Program:
      type: object
      properties:
        id:
          type: string
          format: uuid
        program_identifier:
          type: string
        program_name:
          type: string
        status:
          type: string

    ProgramSubject:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        subject_identifier:
          type: string
        subject_name:
          type: string
        unit_type:
          type: string
          enum: [Core, Elective]

    ReferenceCode:
      type: object
      properties:
        code:
          type: string
          example: "1101"
        description:
          type: string
          example: "Australia"

    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_name:
          type: string
          example: "Global Education Services"
        agent_type:
          type: string
          example: "International"
        primary_contact_name:
          type: string
          nullable: true
          example: "John Smith"
        primary_contact_email:
          type: string
          format: email
          example: "john@globaledu.com"
        primary_contact_phone:
          type: string
          nullable: true
          example: "+61 2 1234 5678"
        status:
          type: string
          example: "Active"
        commission_rate:
          type: number
          format: double
          nullable: true
          example: 15.0

    CourseOffering:
      type: object
      properties:
        id:
          type: string
          format: uuid
        program_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        delivery_location_id:
          type: string
          format: uuid
          nullable: true
        max_students:
          type: integer
          nullable: true
        status:
          type: string
          enum: [Scheduled, Active, Completed, Cancelled]